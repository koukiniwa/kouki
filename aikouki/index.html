<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AIこうき と話そう</title>
    <link rel="stylesheet" href="./style.css">
    <!-- Three.js -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
            "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js",
            "@pixiv/three-vrm-animation": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-animation@2.1.0/lib/three-vrm-animation.module.js"
        }
    }
    </script>
</head>
<body>
    <!-- 戻るリンク -->
    <a href="../" class="back-link-fixed">← ブログに戻る</a>

    <!-- ローディング画面 -->
    <div id="avatar-loading" style="position:fixed;inset:0;background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:20px;">
        <div style="width:48px;height:48px;border:3px solid rgba(255,255,255,0.1);border-top-color:#7eb8ff;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
        <p style="color:rgba(255,255,255,0.6);font-size:14px;margin:0;">AIこうき 起動中...</p>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>

    <!-- 背景画像 -->
    <div id="bg-layer"></div>

    <!-- アバター表示エリア -->
    <div class="avatar-main">
        <canvas id="avatar-canvas"></canvas>

        <!-- 吹き出し（音声オフ時のみ表示） -->
        <div id="speechBubble" class="speech-bubble hidden">
            <p id="bubbleText"></p>
        </div>
    </div>

    <!-- チャット入力エリア（下部固定） -->
    <div class="chat-input-fixed">
        <input
            type="text"
            id="userInput"
            placeholder="メッセージを入力..."
        >
        <button id="sendButton" class="send-btn">送信</button>
    </div>

    <script src="./app.js" type="module"></script>
</body>
</html>
